<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes Dashboard</title>

    <style>
        :root {
            --body-bg: radial-gradient(circle at top left, rgba(59, 130, 246, 0.15), transparent 35%),
                       linear-gradient(180deg, #070b16 0%, #0f172a 100%);
            --panel: #0f172a;
            --card: #141c2f;
            --card-light: #182238;
            --text: #e5e7eb;
            --heading: #f8fafc;
            --muted: #94a3b8;
            --border: #263247;
            --input-bg: #0b1220;
            --blue: #3b82f6;
            --cyan: #0ea5e9;
            --green: #10b981;
            --purple: #8b5cf6;
            --orange: #f59e0b;
            --red: #ef4444;
        }

        body.light-mode {
            --body-bg: #f3f6fb;
            --panel: #ffffff;
            --card: #ffffff;
            --card-light: #ffffff;
            --text: #0f172a;
            --heading: #020617;
            --muted: #475569;
            --border: #cbd5e1;
            --input-bg: #ffffff;
            --blue: #2563eb;
            --cyan: #0284c7;
            --green: #059669;
            --purple: #7c3aed;
            --orange: #d97706;
            --red: #dc2626;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--body-bg);
            color: var(--text);
            font-family: Inter, Segoe UI, Arial, sans-serif;
            padding: 28px;
            transition: background 0.25s ease, color 0.25s ease;
        }

        .dashboard {
            max-width: 1120px;
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 22px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            background: linear-gradient(135deg, #60a5fa, #2563eb);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.35);
            font-size: 24px;
        }

        .brand-title {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--heading);
        }

        .brand-subtitle {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            margin-top: 3px;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .last-updated {
            padding: 9px 14px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--panel);
            color: var(--muted);
            font-size: 13px;
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border);
            background: var(--panel);
            padding: 8px 12px;
            border-radius: 999px;
            color: var(--text);
            font-size: 13px;
            user-select: none;
        }

        .theme-toggle input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        button, .csv-link {
            border: none;
            outline: none;
            border-radius: 9px;
            background: var(--blue);
            color: white;
            padding: 10px 16px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            transition: 0.2s ease;
            font-weight: 600;
        }

        button:hover, .csv-link:hover {
            transform: translateY(-1px);
            filter: brightness(1.08);
        }

        .csv-link {
            background: var(--green);
        }

        .copy-btn {
            background: var(--purple);
        }

        .tweet-btn {
            background: var(--cyan);
        }

        .toolbar {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 28px;
        }

        .search-wrap {
            position: relative;
            margin-bottom: 16px;
        }

        .search-wrap span {
            position: absolute;
            top: 50%;
            left: 14px;
            transform: translateY(-50%);
            color: var(--muted);
        }

        #searchInput {
            width: 100%;
            padding: 14px 14px 14px 42px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 15px;
        }

        #searchInput::placeholder {
            color: var(--muted);
        }

        .filters {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 9px;
        }

        .filter-label {
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-right: 4px;
        }

        .filter-chip {
            background: #1e293b;
            color: #cbd5e1;
            border-radius: 999px;
            padding: 8px 13px;
            font-size: 13px;
            border: 1px solid transparent;
        }

        body.light-mode .filter-chip {
            background: #e2e8f0;
            color: #0f172a;
        }

        .filter-chip.active {
            background: var(--blue);
            color: white;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 14px;
        }

        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .notes-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .card {
            position: relative;
            background: linear-gradient(180deg, var(--card-light), var(--card));
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 22px 22px 22px 26px;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--blue);
        }

        .card.type-change::before {
            background: var(--orange);
        }

        .card.type-announcement::before {
            background: var(--green);
        }

        .card.type-breaking::before {
            background: var(--red);
        }

        .card-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-block;
            padding: 5px 9px;
            border-radius: 5px;
            color: white;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            background: var(--blue);
        }

        .badge.change {
            background: var(--orange);
        }

        .badge.announcement {
            background: var(--green);
        }

        .badge.breaking {
            background: var(--red);
        }

        .date {
            color: var(--muted);
            font-size: 13px;
        }

        .open-link {
            color: var(--muted);
            font-size: 20px;
            text-decoration: none;
        }

        .open-link:hover {
            color: var(--heading);
        }

        .card h2 {
            margin: 10px 0 12px;
            font-size: 21px;
            color: var(--heading);
        }

        .summary {
            color: var(--text);
            line-height: 1.7;
            font-size: 15px;
        }

        .summary a {
            color: #60a5fa;
            text-decoration: none;
        }

        body.light-mode .summary a {
            color: #2563eb;
        }

        .summary a:hover {
            text-decoration: underline;
        }

        .card-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
        }

        .empty {
            border: 1px dashed var(--border);
            padding: 30px;
            text-align: center;
            border-radius: 12px;
            color: var(--muted);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 12px 18px;
            border-radius: 8px;
            display: none;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        .toast.show {
            display: block;
        }

        @media (max-width: 760px) {
            body {
                padding: 18px;
            }

            .topbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .top-actions {
                width: 100%;
                flex-wrap: wrap;
            }

            .brand-title {
                font-size: 22px;
            }

            .card-head {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <main class="dashboard">
        <header class="topbar">
            <div class="brand">
                <div class="logo">🗄️</div>
                <div>
                    <div class="brand-title">BigQuery</div>
                    <div class="brand-subtitle">Release Notes Dashboard</div>
                </div>
            </div>

            <div class="top-actions">
                <div class="last-updated" id="lastUpdated">Last updated: --</div>

                <label class="theme-toggle">
                    <input type="checkbox" id="themeToggle">
                    <span id="themeLabel">Dark mode</span>
                </label>

                <button id="refreshBtn">🔄 Refresh</button>
                <a href="/export/csv" class="csv-link">⬇ Export CSV</a>
                <div class="spinner" id="spinner"></div>
            </div>
        </header>

        <section class="toolbar">
            <div class="search-wrap">
                <span>🔍</span>
                <input id="searchInput" type="text" placeholder="Search release notes e.g. UDF, scaling, table...">
            </div>

            <div class="filters">
                <span class="filter-label">Filter by type:</span>
                <button class="filter-chip active" data-filter="All">All Updates</button>
                <button class="filter-chip" data-filter="Feature">Features</button>
                <button class="filter-chip" data-filter="Change">Changes</button>
                <button class="filter-chip" data-filter="Announcement">Announcements</button>
                <button class="filter-chip" data-filter="Breaking">Breaking</button>
            </div>
        </section>

        <div class="stats">
            <span id="resultCount">Loading release notes...</span>
        </div>

        <section class="notes-list" id="notes"></section>
    </main>

    <div class="toast" id="toast">Copied to clipboard!</div>

    <script>
        const notesDiv = document.getElementById("notes");
        const spinner = document.getElementById("spinner");
        const refreshBtn = document.getElementById("refreshBtn");
        const searchInput = document.getElementById("searchInput");
        const resultCount = document.getElementById("resultCount");
        const lastUpdated = document.getElementById("lastUpdated");
        const toast = document.getElementById("toast");
        const filterButtons = document.querySelectorAll(".filter-chip");
        const themeToggle = document.getElementById("themeToggle");
        const themeLabel = document.getElementById("themeLabel");

        let allNotes = [];
        let activeFilter = "All";

        // Load saved theme
        const savedTheme = localStorage.getItem("theme") || "dark";
        if (savedTheme === "light") {
            document.body.classList.add("light-mode");
            themeToggle.checked = true;
            themeLabel.textContent = "Light mode";
        } else {
            themeLabel.textContent = "Dark mode";
        }

        themeToggle.addEventListener("change", () => {
            if (themeToggle.checked) {
                document.body.classList.add("light-mode");
                themeLabel.textContent = "Light mode";
                localStorage.setItem("theme", "light");
            } else {
                document.body.classList.remove("light-mode");
                themeLabel.textContent = "Dark mode";
                localStorage.setItem("theme", "dark");
            }
        });

        refreshBtn.addEventListener("click", refreshNotes);
        searchInput.addEventListener("input", applyFilters);

        filterButtons.forEach(btn => {
            btn.addEventListener("click", () => {
                filterButtons.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                activeFilter = btn.dataset.filter;
                applyFilters();
            });
        });

        function stripHtml(html) {
            const temp = document.createElement("div");
            temp.innerHTML = html;
            return temp.textContent || temp.innerText || "";
        }

        function detectType(note) {
            const text = `${note.title} ${stripHtml(note.summary)}`.toLowerCase();

            if (text.includes("breaking") || text.includes("issue") || text.includes("known issue")) {
                return "Breaking";
            }

            if (text.includes("announcement") || text.includes("announced")) {
                return "Announcement";
            }

            if (text.includes("change") || text.includes("changed") || text.includes("deprecated") || text.includes("deprecation")) {
                return "Change";
            }

            return "Feature";
        }

        function formatDate(value) {
            if (!value || value === "Date not available") return "Date not available";

            const d = new Date(value);
            if (isNaN(d.getTime())) return value;

            return d.toLocaleDateString("en-US", {
                year: "numeric",
                month: "short",
                day: "2-digit"
            });
        }

        function showToast() {
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 1800);
        }

        async function copyToClipboard(note) {
            const cleanSummary = stripHtml(note.summary);
            const text = `${note.title}\n\n${cleanSummary}\n\n${note.link}`;
            await navigator.clipboard.writeText(text);
            showToast();
        }

        function tweetNote(note) {
            const tweetUrl = `/tweet?text=${encodeURIComponent(note.title)}&url=${encodeURIComponent(note.link)}`;
            window.open(tweetUrl, "_blank");
        }

        function applyFilters() {
            const search = searchInput.value.trim().toLowerCase();

            const filtered = allNotes.filter(note => {
                const noteType = detectType(note);
                const text = `${note.title} ${stripHtml(note.summary)} ${note.published}`.toLowerCase();

                const matchesSearch = !search || text.includes(search);
                const matchesFilter = activeFilter === "All" || noteType === activeFilter;

                return matchesSearch && matchesFilter;
            });

            renderNotes(filtered);
        }

        function renderNotes(notes) {
            notesDiv.innerHTML = "";

            resultCount.textContent = `${notes.length} release note${notes.length === 1 ? "" : "s"} shown`;

            if (notes.length === 0) {
                notesDiv.innerHTML = `<div class="empty">No release notes match your search/filter.</div>`;
                return;
            }

            notes.forEach(note => {
                const type = detectType(note);
                const typeClass = type.toLowerCase();

                const card = document.createElement("article");
                card.className = `card type-${typeClass}`;

                const head = document.createElement("div");
                head.className = "card-head";

                const meta = document.createElement("div");
                meta.className = "card-meta";

                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";

                const badge = document.createElement("span");
                badge.className = `badge ${typeClass}`;
                badge.textContent = type;

                const date = document.createElement("span");
                date.className = "date";
                date.textContent = "📅 " + formatDate(note.published);

                meta.appendChild(checkbox);
                meta.appendChild(badge);
                meta.appendChild(date);

                const openLink = document.createElement("a");
                openLink.href = note.link;
                openLink.target = "_blank";
                openLink.className = "open-link";
                openLink.textContent = "↗";

                head.appendChild(meta);
                head.appendChild(openLink);

                const title = document.createElement("h2");
                title.textContent = note.title;

                const summary = document.createElement("div");
                summary.className = "summary";
                summary.innerHTML = note.summary;

                const buttons = document.createElement("div");
                buttons.className = "card-buttons";

                const tweetBtn = document.createElement("button");
                tweetBtn.className = "tweet-btn";
                tweetBtn.textContent = "Tweet this update";
                tweetBtn.addEventListener("click", () => tweetNote(note));

                const copyBtn = document.createElement("button");
                copyBtn.className = "copy-btn";
                copyBtn.textContent = "Copy to Clipboard";
                copyBtn.addEventListener("click", () => copyToClipboard(note));

                buttons.appendChild(tweetBtn);
                buttons.appendChild(copyBtn);

                card.appendChild(head);
                card.appendChild(title);
                card.appendChild(summary);
                card.appendChild(buttons);

                notesDiv.appendChild(card);
            });
        }

        async function refreshNotes() {
            spinner.style.display = "inline-block";
            refreshBtn.disabled = true;

            try {
                const response = await fetch("/api/notes");
                allNotes = await response.json();

                const now = new Date();
                lastUpdated.textContent = "Last updated: " + now.toLocaleTimeString([], {
                    hour: "2-digit",
                    minute: "2-digit"
                });

                applyFilters();
            } catch (error) {
                notesDiv.innerHTML = `<div class="empty">Failed to load release notes. Please try again.</div>`;
                resultCount.textContent = "Error loading release notes";
            } finally {
                spinner.style.display = "none";
                refreshBtn.disabled = false;
            }
        }

        refreshNotes();
    </script>
</body>
</html>
